kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Namespace }}-concord-agent-operator
subjects:
  - kind: ServiceAccount
    name: concord-agent-operator
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-concord-agent-operator
  apiGroup: rbac.authorization.k8s.io
